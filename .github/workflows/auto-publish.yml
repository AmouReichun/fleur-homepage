name: Auto Publish Articles

on:
  schedule:
    # 18:00 JST (= 09:00 UTC) に1日1回起動。config の publishHourJST(18) と一致。
    # config/auto-publish.json の publishHourJST を変更する場合はこの cron も合わせて更新すること。
    - cron: '0 9 * * *'
  workflow_dispatch:

# main へ commit/push するワークフロー（staff-upload-generate / daily-generate と共有）を
# 直列化し、並行 push によるref衝突を防ぐ。
concurrency:
  group: content-push
  cancel-in-progress: false

jobs:
  auto-publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # Node.js インストール前に設定チェックして早期終了（コスト削減）
      - name: Check schedule config
        id: check
        run: |
          python3 - << 'PYEOF'
          import json, os
          from datetime import datetime, timezone, timedelta

          config_path = "config/auto-publish.json"
          defaults = {"enabled": True, "publishHourJST": 12, "articlesPerSalon": 1, "publishDaysOfWeek": [2, 5]}

          try:
              with open(config_path) as f:
                  cfg = {**defaults, **json.load(f)}
          except Exception:
              cfg = defaults

          enabled = cfg.get("enabled", True)
          target_hour = int(cfg.get("publishHourJST", 12))

          jst = timezone(timedelta(hours=9))
          now_jst = datetime.now(jst)
          current_hour = now_jst.hour

          # Python weekday(): 0=月〜6=日 → config day: 0=日,1=月,...,6=土
          # 変換式: (weekday + 1) % 7
          today_config_day = (now_jst.weekday() + 1) % 7
          days_filter = cfg.get("publishDaysOfWeek")

          # workflow_dispatch は常に実行。schedule は遅延を考慮し「目標時刻以降」なら実行
          event = os.environ.get("GITHUB_EVENT_NAME", "")
          is_dispatch = event == "workflow_dispatch"

          skip_reason = None
          if not enabled:
              skip_reason = "無効"
          elif current_hour < target_hour and not is_dispatch:
              skip_reason = f"目標時刻前 ({current_hour}時 < {target_hour}時 JST)"
          elif days_filter and today_config_day not in days_filter and not is_dispatch:
              day_names = ["日", "月", "火", "水", "木", "金", "土"]
              allowed = "・".join(day_names[d] for d in days_filter)
              skip_reason = f"本日({day_names[today_config_day]}曜)は公開日外 (設定: {allowed}曜)"

          skip = skip_reason is not None

          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"skip={'true' if skip else 'false'}\n")

          if skip:
              print(f"スキップ: {skip_reason}")
          else:
              day_names = ["日", "月", "火", "水", "木", "金", "土"]
              print(f"実行: {current_hour}時 JST ({day_names[today_config_day]}曜, {cfg['articlesPerSalon']}件/サロン)")
          PYEOF

      - name: Setup Node.js
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        if: steps.check.outputs.skip == 'false'
        run: npm ci

      - name: Auto publish articles
        if: steps.check.outputs.skip == 'false'
        run: npx tsx scripts/auto-publish.ts
        env:
          GBP_WEBHOOK_URL: ${{ secrets.GBP_WEBHOOK_URL }}

      - name: Commit and push published articles
        id: commit
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/
          if git diff --staged --quiet; then
            echo "変更なし、スキップ"
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "auto-publish: $(date +'%Y-%m-%d') 各サロン公開"
          pushed=false
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main
            if git push; then pushed=true; break; fi
            echo "push衝突を検知、リトライ $i/5"
            sleep $((RANDOM % 5 + 3))
          done
          if [ "$pushed" != true ]; then
            echo "5回リトライしてもpushに失敗しました" >&2
            exit 1
          fi
          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: Deploy to Vercel (Production)
        if: steps.commit.outputs.committed == 'true'
        run: npx vercel --prod --yes --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
