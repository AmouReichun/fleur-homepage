name: Generate Article from Staff Upload

on:
  push:
    paths:
      - 'content/uploads/**.json'

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate articles from staff uploads
        run: npx tsx scripts/generate-from-uploads.ts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and push
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/ public/
          if git diff --staged --quiet; then
            echo "変更なし、スキップ"
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "auto(upload): スタッフ投稿から記事生成 $(date +'%Y-%m-%d %H:%M')"
          git pull --rebase --autostash origin main
          git push
          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: Deploy to Vercel (Production)
        if: steps.commit.outputs.committed == 'true'
        run: npx vercel --prod --yes --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
