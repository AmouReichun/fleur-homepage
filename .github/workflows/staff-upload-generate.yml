name: Generate Article from Staff Upload

on:
  push:
    paths:
      - 'content/uploads/**.json'

# main へ commit/push するワークフロー（daily-generate / auto-publish と共有）を
# 直列化し、並行 push によるref衝突と同一uploadの重複記事生成を防ぐ。
concurrency:
  group: content-push
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate articles from staff uploads
        run: npx tsx scripts/generate-from-uploads.ts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and push
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/ public/
          if git diff --staged --quiet; then
            echo "変更なし、スキップ"
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "auto(upload): スタッフ投稿から記事生成 $(date +'%Y-%m-%d %H:%M')"
          pushed=false
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main
            if git push; then pushed=true; break; fi
            echo "push衝突を検知、リトライ $i/5"
            sleep $((RANDOM % 5 + 3))
          done
          if [ "$pushed" != true ]; then
            echo "5回リトライしてもpushに失敗しました" >&2
            exit 1
          fi
          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: Deploy to Vercel (Production)
        if: steps.commit.outputs.committed == 'true'
        run: npx vercel --prod --yes --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
