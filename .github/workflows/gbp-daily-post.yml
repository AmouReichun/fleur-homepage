name: GBP Daily Post

on:
  schedule:
    # 20:00 JST (= 11:00 UTC) に1日1回起動。auto-publish（18:00 JST）の2時間後。
    - cron: '0 11 * * *'
  workflow_dispatch:

# content-push グループで auto-publish と直列化し、ref衝突を防ぐ。
concurrency:
  group: content-push
  cancel-in-progress: false

jobs:
  gbp-daily-post:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Post to GBP
        run: npx tsx scripts/gbp-daily-post.ts
        env:
          GBP_WEBHOOK_URL: ${{ secrets.GBP_WEBHOOK_URL }}

      - name: Commit tracking file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/gbp-posted.json
          if git diff --staged --quiet; then
            echo "変更なし"
            exit 0
          fi
          git commit -m "gbp-daily-post: $(date +'%Y-%m-%d') GBP投稿記録"
          pushed=false
          for i in 1 2 3; do
            git pull --rebase --autostash origin main
            if git push; then pushed=true; break; fi
            echo "push衝突リトライ $i/3"
            sleep $((RANDOM % 5 + 3))
          done
          if [ "$pushed" != true ]; then
            echo "push に失敗しました" >&2
            exit 1
          fi
