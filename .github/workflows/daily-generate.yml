name: Daily Article Generation

on:
  schedule:
    # 13:00 JST (= 04:00 UTC) に1日1回起動。GitHub Actions の遅延に強い構成。
    # config/daily-generate.json の hourJST を変更する場合はこの cron も合わせて更新すること。
    - cron: '0 4 * * *'
  workflow_dispatch:
    # 手動実行も可能（テスト用）

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # 設定チェック（Node.jsインストール前に早期終了でコスト削減）
      - name: Check schedule config
        id: check
        run: |
          python3 - << 'PYEOF'
          import json, os
          from datetime import datetime, timezone, timedelta

          config_path = "config/daily-generate.json"
          defaults = {"enabled": True, "hourJST": 10, "perSalon": 1}

          try:
              with open(config_path) as f:
                  cfg = {**defaults, **json.load(f)}
          except Exception:
              cfg = defaults

          enabled = cfg.get("enabled", True)
          target_hour = int(cfg.get("hourJST", 10))

          jst = timezone(timedelta(hours=9))
          current_hour = datetime.now(jst).hour

          # workflow_dispatch は常に実行。schedule は遅延を考慮し「目標時刻以降」なら実行
          event = os.environ.get("GITHUB_EVENT_NAME", "")
          skip = not enabled or (current_hour < target_hour and event != "workflow_dispatch")

          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"skip={'true' if skip else 'false'}\n")

          if skip:
              reason = "無効" if not enabled else f"目標時刻前 ({current_hour}時 < {target_hour}時 JST)"
              print(f"スキップ: {reason}")
          else:
              print(f"実行: {current_hour}時 JST (設定: {target_hour}時 JST, {cfg['perSalon']}件/サロン)")

          # 設定されている IG_BUSINESS_ID_* を表示（デバッグ用）
          for key in ["IG_BUSINESS_ID_FLEURAMI", "IG_BUSINESS_ID_RIV", "IG_BUSINESS_ID_RAFFINE"]:
              val = os.environ.get(key, "")
              status = "✓ 設定済み" if val else "✗ 未設定"
              print(f"  {key}: {status}")
          PYEOF
        env:
          IG_BUSINESS_ID_FLEURAMI: ${{ secrets.IG_BUSINESS_ID_FLEURAMI }}
          IG_BUSINESS_ID_RIV: ${{ secrets.IG_BUSINESS_ID_RIV }}
          IG_BUSINESS_ID_RAFFINE: ${{ secrets.IG_BUSINESS_ID_RAFFINE }}

      - name: Setup Node.js
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        if: steps.check.outputs.skip == 'false'
        run: npm ci

      - name: Generate articles
        if: steps.check.outputs.skip == 'false'
        run: npx tsx scripts/daily-generate.ts
        env:
          META_APP_ID: ${{ secrets.META_APP_ID }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          META_LONG_LIVED_TOKEN: ${{ secrets.META_LONG_LIVED_TOKEN }}
          IG_BUSINESS_ID_FLEURAMI: ${{ secrets.IG_BUSINESS_ID_FLEURAMI }}
          IG_BUSINESS_ID_RIV: ${{ secrets.IG_BUSINESS_ID_RIV }}
          IG_BUSINESS_ID_RAFFINE: ${{ secrets.IG_BUSINESS_ID_RAFFINE }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and push generated articles
        id: commit
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/ public/images/
          if git diff --staged --quiet; then
            echo "変更なし、スキップ"
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "auto: daily article generation $(date +'%Y-%m-%d')"
          git pull --rebase --autostash origin main
          git push
          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: Deploy to Vercel (Production)
        if: steps.commit.outputs.committed == 'true'
        run: npx vercel --prod --yes --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
